<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Taskify</h1>
    </header>
    <div class="container">
        <div class="todoContainer dropzone target" data-status="todo">
            <div class="topic">
                <p class="heading">To Do</p>
            </div>  
            <div class="todos">
                <div class="addTasks">
                    <p>Add New</p>
                    <p>+</p>
                </div>
            </div>
        </div>
        <div class="in-progress dropzone target" data-status="in-progress">
            <div class="topic">
                <p class="heading">In Progress</p>
            </div> 
            <div class="todos">
                <div class="addTasks">
                    <p>Add New</p>
                    <p>+</p>
                </div>
            </div>
        </div>
        <div class="under-review dropzone target" data-status="under-review">
            <div class="topic">
                <p class="heading">Under Review</p>
            </div> 
            <div class="todos">
                <div class="addTasks">
                    <p>Add New</p>
                    <p>+</p>
                </div>
            </div>
        </div>
        <div class="finished dropzone target" data-status="finished">
            <div class="topic">
                <p class="heading">Finished</p>
            </div> 
            <div class="todos">
                <div class="addTasks">
                    <p>Add New</p>
                    <p>+</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
