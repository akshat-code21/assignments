<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskify Frontend</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <header>
      <h1>To Do List Assignment</h1>
    </header>
    <div class="container">
      <div class="message">
        <h1>Please Signup & Login</h1>
      </div>
      <div class="auth">
        <div class="signup">
          <h1>Signup</h1>
          <input type="text" id="username" placeholder="Enter username">
          <input type="password" id="password" placeholder="Enter password">
          <button onclick="signup()">Signup</button>
        </div>
        <div class="login">
          <h1>Login</h1>
          <input type="text" id="signin_username" placeholder="Enter username">
          <input type="password" id="signin_password" placeholder="Enter password">
          <button onclick="login()">Login</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
