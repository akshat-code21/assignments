      <h1 class="heading">Bookmark Manager</h1>

      <div class="input-container">

          type="url"
          id="bookmark-url"
          placeholder="Enter bookmark URL : http://www.example.com"
          pattern="http://.*"
          required
        />
        <input
          type="text"
          id="bookmark-category"
          placeholder="Enter category"
        />
        <button id="add-bookmark-btn">Add Bookmark</button>
